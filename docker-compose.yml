services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: layertrace
      POSTGRES_USER: layertrace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layertrace -d layertrace"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: &database-url postgresql+psycopg://layertrace:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/layertrace
      LAYERTRACE_API_TOKEN: ${LAYERTRACE_API_TOKEN:?Set LAYERTRACE_API_TOKEN in .env}
      LAYERTRACE_REQUIRE_API_TOKEN: "true"
      LAYERTRACE_TASK_RUNNER: external
      LAYERTRACE_LOG_LEVEL: INFO
      LAYERTRACE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # 워커는 API 이미지와 같은 애플리케이션 코드를 사용합니다.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["uv", "run", "python", "scripts/run_worker.py", "--poll-interval", "1"]
    environment:
      DATABASE_URL: *database-url
      LAYERTRACE_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy

  # 프론트엔드 이미지는 Vite 빌드를 서빙하고 기본적으로 로컬 API를 바라봅니다.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_LAYERTRACE_API_BASE_URL: ${VITE_LAYERTRACE_API_BASE_URL:-http://localhost:8080}
        VITE_LAYERTRACE_ALLOW_DEMO_FALLBACK: ${VITE_LAYERTRACE_ALLOW_DEMO_FALLBACK:-false}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  # 이름 있는 볼륨으로 compose 재시작 후에도 데이터베이스 상태를 유지합니다.
  postgres-data:
