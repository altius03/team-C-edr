services:
  # Stateful store for API persistence during local PoC runs.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: layertrace
      POSTGRES_USER: layertrace
      POSTGRES_PASSWORD: layertrace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layertrace -d layertrace"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Kafka-compatible broker for stream-oriented ingestion tests.
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  # API uses token-required local defaults and delegates background work externally.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://layertrace:layertrace@postgres:5432/layertrace
      LAYERTRACE_API_TOKEN: ${LAYERTRACE_API_TOKEN:-local-dev-token}
      LAYERTRACE_REQUIRE_API_TOKEN: "true"
      LAYERTRACE_TASK_RUNNER: external
      LAYERTRACE_LOG_LEVEL: INFO
      LAYERTRACE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Worker shares the API image so jobs run against the same application code.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["uv", "run", "python", "scripts/run_worker.py", "--poll-interval", "1"]
    environment:
      DATABASE_URL: postgresql+psycopg://layertrace:layertrace@postgres:5432/layertrace
      LAYERTRACE_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend image serves the Vite build and targets the local API by default.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_LAYERTRACE_API_BASE_URL: ${VITE_LAYERTRACE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  # Named volume keeps database state across compose restarts.
  postgres-data:
