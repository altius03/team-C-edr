services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: layertrace
      POSTGRES_USER: layertrace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layertrace -d layertrace"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: &database-url postgresql+psycopg://layertrace:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/layertrace
      CELERY_BROKER_URL: &celery-broker-url redis://redis:6379/0
      REDIS_URL: *celery-broker-url
      LAYERTRACE_API_TOKEN: ${LAYERTRACE_API_TOKEN:?Set LAYERTRACE_API_TOKEN in .env}
      LAYERTRACE_REQUIRE_API_TOKEN: "true"
      LAYERTRACE_TASK_RUNNER: celery
      LAYERTRACE_LOG_LEVEL: INFO
      LAYERTRACE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["uv", "run", "celery", "-A", "src.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=1"]
    environment:
      DATABASE_URL: *database-url
      CELERY_BROKER_URL: *celery-broker-url
      REDIS_URL: *celery-broker-url
      LAYERTRACE_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["uv", "run", "python", "scripts/migrate_postgres.py"]
    environment:
      DATABASE_URL: *database-url
      LAYERTRACE_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_LAYERTRACE_API_BASE_URL: ${VITE_LAYERTRACE_API_BASE_URL:-http://localhost:8080}
        VITE_LAYERTRACE_ALLOW_DEMO_FALLBACK: ${VITE_LAYERTRACE_ALLOW_DEMO_FALLBACK:-false}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  # 이름 있는 볼륨으로 compose 재시작 후에도 데이터베이스 상태를 유지합니다.
  postgres-data:
